
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pencarian Wilayah Indonesia</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:15px;
margin:0;
}
.box{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}
h1{
text-align:center;
color:#1565c0;
}
input{
width:100%;
padding:15px;
font-size:18px;
border-radius:10px;
border:2px solid #1976d2;
box-sizing:border-box;
}
.result{
margin-top:15px;
padding:15px;
background:#e3f2fd;
border-radius:10px;
border-left:5px solid #1565c0;
}
.label{
font-size:12px;
color:#555;
margin-top:8px;
}
.value{
font-weight:bold;
font-size:18px;
}
.error{
background:#ffebee;
border-left-color:#d32f2f;
}
</style>
</head>

<body>

<div class="box">

<h1>Pencarian Wilayah Indonesia 🇮🇩</h1>

<input type="text" id="search" placeholder="Cari desa / kecamatan / kabupaten">

<div id="status">Memuat database...</div>

<div id="hasil"></div>

</div>

<script>

let DATA = [];

fetch("search_data.json")
.then(r=>r.json())
.then(d=>{
DATA = d;
document.getElementById("status").innerHTML =
"✅ Database berhasil dimuat (" + DATA.length + " data)";
})
.catch(err=>{
document.getElementById("status").innerHTML =
"❌ Database gagal dimuat";
console.log(err);
});

function norm(s){
return (s || "").toLowerCase().trim();
}

document.getElementById("search")
.addEventListener("input", function(){

const key = norm(this.value);

const hasil = document.getElementById("hasil");

hasil.innerHTML = "";

if(key.length < 2) return;

const keywords = key
.split(/[,\s]+/)
.map(v => norm(v))
.filter(v => v);

const found = DATA.filter(x => {

const gabung = (
x.name + ' ' +
x.kecamatan + ' ' +
x.kabupaten + ' ' +
x.provinsi
).toLowerCase();

return keywords.every(k => gabung.includes(k));

}).slice(0,100);

if(found.length === 0){

hasil.innerHTML = `
<div class="result error">
<div class="value">Data tidak ditemukan</div>
</div>
`;

return;
}

found.forEach(x=>{

const hasilAlamat = `${x.kabupaten.replace(/KABUPATEN /i,'').replace(/KOTA /i,'')}, ${x.kecamatan}, ${x.name}`;

hasil.innerHTML += `
<div class="result">

<div class="label">Hasil Alamat</div>

<div class="value"
style="user-select:all;-webkit-user-select:all;"
onclick="navigator.clipboard.writeText('${hasilAlamat}')">
${hasilAlamat}
</div>

<div style="
margin-top:10px;
font-size:12px;
color:green;
">
Klik alamat untuk salin
</div>

</div>
`;

});

});

</script>

</body>
</html>
