
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pencarian Wilayah Indonesia</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2f5f7;
padding:20px;
margin:0;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#1565c0;
}

input{
width:100%;
padding:14px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

.card{
margin-top:15px;
padding:15px;
background:#e3f2fd;
border-left:5px solid #1976d2;
border-radius:10px;
}

.label{
font-size:13px;
color:#555;
margin-top:8px;
}

.value{
font-size:18px;
font-weight:bold;
}

.status{
margin-top:10px;
font-size:14px;
color:green;
}

.error{
background:#ffebee;
border-left-color:#d32f2f;
}
</style>
</head>

<body>

<div class="container">

<h1>Pencarian Wilayah Indonesia 🇮🇩</h1>

<input type="text" id="searchInput" placeholder="Cari desa, kecamatan, kabupaten...">

<div class="status" id="status">Memuat database...</div>

<div id="results"></div>

</div>

<script>

let DATA = [];

async function loadData(){

try{

const res = await fetch('./indonesia-region.min.json');

DATA = await res.json();

document.getElementById('status').innerHTML =
'✅ Database berhasil dimuat';

}catch(err){

document.getElementById('status').innerHTML =
'❌ Gagal memuat database';

console.log(err);

}

}

loadData();

function norm(txt){
return String(txt || '')
.toLowerCase()
.trim();
}

document.getElementById('searchInput')
.addEventListener('input', function(){

const keyword = norm(this.value);

const results = document.getElementById('results');

results.innerHTML = '';

if(keyword.length < 2) return;

let total = 0;

for(const prov of DATA){

for(const kab of (prov.regencies || [])){

if(norm(kab.name).includes(keyword)){

total++;

results.innerHTML += `
<div class="card">
<div class="label">Kabupaten/Kota</div>
<div class="value">${kab.name}</div>

<div class="label">Provinsi</div>
<div class="value">${prov.name}</div>
</div>
`;

}

for(const kec of (kab.districts || [])){

if(norm(kec.name).includes(keyword)){

total++;

results.innerHTML += `
<div class="card">
<div class="label">Kecamatan</div>
<div class="value">${kec.name}</div>

<div class="label">Kabupaten/Kota</div>
<div class="value">${kab.name}</div>

<div class="label">Provinsi</div>
<div class="value">${prov.name}</div>
</div>
`;

}

for(const desa of (kec.villages || [])){

if(norm(desa.name).includes(keyword)){

total++;

results.innerHTML += `
<div class="card">
<div class="label">Kelurahan/Desa</div>
<div class="value">${desa.name}</div>

<div class="label">Kecamatan</div>
<div class="value">${kec.name}</div>

<div class="label">Kabupaten/Kota</div>
<div class="value">${kab.name}</div>

<div class="label">Provinsi</div>
<div class="value">${prov.name}</div>
</div>
`;

}

}

}

}

}

if(total === 0){

results.innerHTML = `
<div class="card error">
<div class="value">Data tidak ditemukan</div>
</div>
`;

}

});

</script>

</body>
</html>
