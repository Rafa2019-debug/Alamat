<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pencarian Wilayah Indonesia Full Offline</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f2f5f7;
margin:0;
padding:20px;
}
.container{
max-width:700px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,.1);
}
h1{
text-align:center;
color:#1565c0;
}
input{
width:100%;
padding:14px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}
.result{
margin-top:20px;
}
.card{
background:#e3f2fd;
padding:15px;
border-radius:10px;
margin-bottom:10px;
border-left:5px solid #1976d2;
}
.label{
font-size:13px;
color:#666;
}
.value{
font-weight:bold;
font-size:18px;
margin-top:5px;
}
.status{
margin-top:10px;
font-size:14px;
color:#2e7d32;
}
</style>
</head>
<body>
<div class="container">
<h1>Pencarian Wilayah Indonesia 🇮🇩</h1>

<input type="text" id="search" placeholder="Cari desa / kelurahan / kecamatan / kabupaten">

<div class="status" id="status">Memuat database wilayah...</div>

<div class="result" id="result"></div>
</div>

<script>
let wilayahData = [];

fetch('indonesia-region.min.json')
.then(res => res.json())
.then(data => {
wilayahData = data;
document.getElementById('status').innerHTML =
'✅ Database wilayah Indonesia berhasil dimuat';
})
.catch(err => {
document.getElementById('status').innerHTML =
'❌ Gagal memuat database';
});

function normalize(str){
return str.toLowerCase().trim();
}

document.getElementById('search').addEventListener('input', function(){
const keyword = normalize(this.value);

const resultBox = document.getElementById('result');
resultBox.innerHTML = '';

if(keyword.length < 2) return;

let found = 0;

wilayahData.forEach(prov => {
(prov.regencies || []).forEach(kab => {
(kab.districts || []).forEach(kec => {

if(normalize(kec.name).includes(keyword)){
found++;

resultBox.innerHTML += `
<div class="card">
<div class="label">Kecamatan</div>
<div class="value">${kec.name}</div>

<div class="label">Kabupaten/Kota</div>
<div class="value">${kab.name}</div>

<div class="label">Provinsi</div>
<div class="value">${prov.name}</div>
</div>`;
}

(kec.villages || []).forEach(kel => {
if(normalize(kel.name).includes(keyword)){
found++;

resultBox.innerHTML += `
<div class="card">
<div class="label">Kelurahan / Desa</div>
<div class="value">${kel.name}</div>

<div class="label">Kecamatan</div>
<div class="value">${kec.name}</div>

<div class="label">Kabupaten/Kota</div>
<div class="value">${kab.name}</div>

<div class="label">Provinsi</div>
<div class="value">${prov.name}</div>
</div>`;
}
});
});
});
});

if(found === 0){
resultBox.innerHTML = `
<div class="card" style="background:#ffebee;border-left-color:#d32f2f;">
<div class="value">Data tidak ditemukan</div>
</div>`;
}
});
</script>
</body>
</html>
